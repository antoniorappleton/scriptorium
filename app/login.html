<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Scriptorium</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
  </head>
  <body>
    <main class="login-main">
      <img src="assets/logo.png" alt="Scriptorium" class="login-logo" />
      <h1>Entrar — Professores</h1>
      <form id="loginForm">
        <label class="block text-sm">Email</label>
        <input
          type="email"
          id="email"
          required
          placeholder="scriptorium@colegio-ramalhao.com"
          autofocus
          class="mt-1 block w-full rounded-md border-gray-200 p-2"
        />
        <label class="block text-sm mt-3">Password</label>
        <input
          type="password"
          id="password"
          required
          class="mt-1 block w-full rounded-md border-gray-200 p-2"
        />
        <div class="flex items-center gap-3 mt-4">
          <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded-md"
          >
            Entrar
          </button>
          <button type="button" id="forgot" class="text-sm text-gray-600">
            Esqueci-me da password
          </button>
        </div>
      </form>
      <p id="msg" class="mt-3 text-sm"></p>
      <p class="mt-2 text-sm text-gray-500">
        Conta de teste: <strong>scriptorium@colegio-ramalhao.com</strong>
      </p>
    </main>

    <script>
      (async () => {
        if (window.supabaseReady) await window.supabaseReady;

        // If already logged in, go to dashboard
        try {
          const { data } = await window.supabase.auth.getSession();
          if (data?.session) {
            window.location.href = "index.html";
            return;
          }
        } catch (e) {
          console.warn("No active session", e);
        }

        const form = document.getElementById("loginForm");
        const msg = document.getElementById("msg");
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          msg.textContent = "";
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const submitBtn = form.querySelector("button[type=submit]");
          submitBtn.disabled = true;
          submitBtn.textContent = "A entrar…";
          if (!email || !password)
            return (msg.textContent = "Email e password são obrigatórios");

          const { data, error } = await window.supabase.auth.signInWithPassword(
            { email, password },
          );
          if (error) {
            msg.textContent = "Erro: " + error.message;
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }
          // Successful login
          window.location.href = "index.html";
        });

        document
          .getElementById("forgot")
          .addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();
            if (!email)
              return (msg.textContent =
                "Coloca o teu email primeiro para recuperar a password");
            const { error } =
              await window.supabase.auth.resetPasswordForEmail(email);
            if (error) msg.textContent = "Erro: " + error.message;
            else
              msg.textContent =
                "Pedido de recuperação enviado. Verifica o teu email.";
          });
      })();
    </script>
  </body>
</html>
