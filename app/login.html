<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Scriptorium</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
  </head>
  <body>
    <main class="login-container">
      <div class="login-card">
        <div class="login-header">
          <img
            src="assets/logo.png"
            alt="Scriptorium Logo"
            class="login-logo"
          />
          <h2>SCRIPTORIUM</h2>
          <p>Portal de Registo de Ocorrências</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email do Professor</label>
            <div class="input-with-icon">
              <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
              </svg>
              <input
                type="email"
                id="email"
                required
                placeholder="exemplo@colegio-ramalhao.com"
                autofocus
                class="form-control"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Palavra-passe</label>
            <div class="input-with-icon">
              <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 17a2 2 0 100-4 2 2 0 000 4zm6-7h-1V7a5 5 0 00-10 0v3H6a2 2 0 00-2 2v7a2 2 0 002 2h12a2 2 0 002-2v-7a2 2 0 00-2-2zM8 7a4 4 0 018 0v3H8V7z" />
              </svg>
              <input
                type="password"
                id="password"
                required
                placeholder="••••••••"
                class="form-control"
              />
              <button type="button" id="togglePasswordBtn" class="input-action" aria-label="Mostrar palavra-passe">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10z"/>
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div id="msg" style="margin-top: 16px"></div>

          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 10px;
              margin-top: 24px;
            "
          >
            <button type="submit" class="btn btn-primary" style="width: 100%">
              Entrar
            </button>
            <button
              type="button"
              id="forgot"
              class="btn btn-secondary"
              style="width: 100%"
            >
              Recuperar Palavra-passe
            </button>
          </div>
        </form>

        <div class="login-footer">
          Conta de teste: <strong>scriptorium@colegio-ramalhao.com</strong>
        </div>
      </div>
    </main>

    <script>
      (async () => {
        if (window.supabaseReady) await window.supabaseReady;

        // If already logged in, redirect according to role
        try {
          const { data } = await window.supabase.auth.getSession();
          const session = data?.session;
          if (session) {
            // check role in professores table and redirect admins to admin.html
            try {
              const email = session.user.email;
              const { data: prof } = await window.supabase
                .from("professores")
                .select("role")
                .eq("email", email)
                .maybeSingle();
              if (prof?.role === "admin") {
                window.location.href = "admin.html";
                return;
              }
            } catch (e) {
              // ignore and fall back to dashboard
              console.warn("Role check failed", e);
            }
            window.location.href = "index.html";
            return;
          }
        } catch (e) {
          console.warn("No active session", e);
        }

        const form = document.getElementById("loginForm");
        const msg = document.getElementById("msg");

        function isValidEmail(v) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
        }

        function showMessage(text, isError = true) {
          if (!text) {
            msg.innerHTML = "";
            return;
          }
          msg.innerHTML = `
            <div class="alert ${isError ? "alert-error" : "alert-success"}">
              <span style="font-size: 16px; font-weight: bold;">
                ${isError ? "⚠️" : "✓"}
              </span>
              <span>${text}</span>
            </div>
          `;
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          showMessage("");
          const rawEmail = document.getElementById("email").value || "";
          const email = rawEmail.trim().toLowerCase();
          const password = document.getElementById("password").value;
          const submitBtn = form.querySelector("button[type=submit]");
          submitBtn.disabled = true;
          submitBtn.textContent = "A entrar…";

          if (!email || !password) {
            showMessage("Email e palavra-passe são obrigatórios.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }

          if (!isValidEmail(email)) {
            showMessage("Email inválido — confirma o endereço.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }

          const { data, error } = await window.supabase.auth.signInWithPassword(
            {
              email,
              password,
            },
          );
          if (error) {
            showMessage("Erro: " + error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }
          // Successful login: redirect admins to admin screen
          try {
            const session =
              data?.session ||
              (await window.supabase.auth.getSession()).data.session;
            const email = session?.user?.email;
            if (email) {
              const { data: prof } = await window.supabase
                .from("professores")
                .select("role")
                .eq("email", email)
                .maybeSingle();
              if (prof?.role === "admin") {
                window.location.href = "admin.html";
                return;
              }
            }
          } catch (e) {
            console.warn("Post-login role check failed", e);
          }
          // Default redirect
          window.location.href = "index.html";
        });

        document
          .getElementById("forgot")
          .addEventListener("click", async () => {
            showMessage("");
            const rawEmail = document.getElementById("email").value || "";
            const email = rawEmail.trim().toLowerCase();
            if (!email) {
              showMessage(
                "Coloca o teu email primeiro para recuperar a palavra-passe.",
              );
              return;
            }
            if (!isValidEmail(email)) {
              showMessage("Email inválido — confirma o endereço.");
              return;
            }

            const forgotBtn = document.getElementById("forgot");
            forgotBtn.disabled = true;
            forgotBtn.textContent = "A processar...";

            const { error } =
              await window.supabase.auth.resetPasswordForEmail(email);

            forgotBtn.disabled = false;
            forgotBtn.textContent = "Recuperar Palavra-passe";

            if (error) {
              showMessage("Erro: " + error.message);
            } else {
              showMessage(
                "Pedido de recuperação enviado. Verifica o teu email.",
                false,
              );
            }
          });

        // Password visibility toggle (uses inline SVGs)
        const togglePasswordBtn = document.getElementById("togglePasswordBtn");
        if (togglePasswordBtn) {
          const pwdInput = document.getElementById("password");
          const EYE_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10z"/><circle cx="12" cy="12" r="3"/></svg>';
          const EYE_OFF_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M2 4.27L3.28 3 21 20.72 19.73 22 17.72 19.99C15.5 21.07 13.78 21.5 12 21.5 7 21.5 2.73 18.39 1 14c.66-1.52 1.6-2.91 2.73-4.03L2 4.27z"/></svg>';
          togglePasswordBtn.addEventListener("click", () => {
            if (!pwdInput) return;
            if (pwdInput.type === "password") {
              pwdInput.type = "text";
              togglePasswordBtn.innerHTML = EYE_OFF_SVG;
              togglePasswordBtn.setAttribute("aria-label", "Ocultar palavra-passe");
            } else {
              pwdInput.type = "password";
              togglePasswordBtn.innerHTML = EYE_SVG;
              togglePasswordBtn.setAttribute("aria-label", "Mostrar palavra-passe");
            }
          });
        }
      })();
    </script>
    <footer style="padding: 14px 0; text-align: center; color: var(--text-muted); font-size: 12px;">
      made by antonio.appleton | Departamento de Programação
    </footer>
  </body>
</html>
