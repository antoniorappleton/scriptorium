<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Scriptorium</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app/css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/app/js/supabase.js"></script>
  </head>
  <body>
    <main class="login-main">
      <img src="/app/assets/logo.svg" alt="Scriptorium" class="login-logo" />
      <h1>Entrar — Professores</h1>
      <form id="loginForm">
        <label>Email<input type="email" id="email" required /></label>
        <button type="submit">Enviar link de entrada</button>
      </form>
      <p id="msg"></p>
    </main>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const { error } = await window.supabase.auth.signInWithOtp({ email });
          const msg = document.getElementById("msg");
          if (error) msg.textContent = "Erro: " + error.message;
          else
            msg.textContent =
              "Link enviado para " + email + ". Verifica o teu e‑mail.";
        });
    </script>
  </body>
</html>
