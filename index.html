<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting — Scriptorium</title>
    <meta http-equiv="refresh" content="0; url=./app/index.html" />
    <script>
      // Use an explicit relative path so GitHub Pages preserves the repository base path
      try {
        location.replace("./app/index.html");
      } catch (e) {
        // fallback to absolute relative link
        location.href = "./app/index.html";
      }
    </script>
  </head>
  <body>
    <p>Redirecionando para <a href="./app/index.html">app/index.html</a>…</p>
  </body>
</html>
