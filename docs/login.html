<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Scriptorium</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
  </head>
  <body>
    <main class="login-container">
      <div class="login-card">
        <div class="login-header">
          <img src="assets/logo.png" alt="Scriptorium Logo" class="login-logo" />
          <h2>SCRIPTORIUM</h2>
          <p>Portal de Registo de Ocorrências</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email do Professor</label>
            <input
              type="email"
              id="email"
              required
              placeholder="exemplo@colegio-ramalhao.com"
              autofocus
              class="form-control"
            />
          </div>

          <div class="form-group">
            <label for="password">Palavra-passe</label>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="form-control"
            />
          </div>

          <div id="msg" style="margin-top: 16px;"></div>

          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 24px;">
            <button
              type="submit"
              class="btn btn-primary"
              style="width: 100%;"
            >
              Entrar
            </button>
            <button type="button" id="forgot" class="btn btn-secondary" style="width: 100%;">
              Recuperar Palavra-passe
            </button>
          </div>
        </form>

        <div class="login-footer">
          Conta de teste: <strong>scriptorium@colegio-ramalhao.com</strong>
        </div>
      </div>
    </main>

    <script>
      (async () => {
        if (window.supabaseReady) await window.supabaseReady;

        // If already logged in, redirect according to role
        try {
          const { data } = await window.supabase.auth.getSession();
          const session = data?.session;
          if (session) {
            try {
              const email = session.user.email;
              const { data: prof } = await window.supabase
                .from("professores")
                .select("role")
                .eq("email", email)
                .maybeSingle();
              if (prof?.role === "admin") {
                window.location.href = "admin.html";
                return;
              }
            } catch (e) {
              console.warn("Role check failed", e);
            }
            window.location.href = "index.html";
            return;
          }
        } catch (e) {
          console.warn("No active session", e);
        }

        const form = document.getElementById("loginForm");
        const msg = document.getElementById("msg");

        function isValidEmail(v) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
        }

        function showMessage(text, isError = true) {
          if (!text) {
            msg.innerHTML = "";
            return;
          }
          msg.innerHTML = `
            <div class="alert ${isError ? 'alert-error' : 'alert-success'}">
              <span style="font-size: 16px; font-weight: bold;">
                ${isError ? '⚠️' : '✓'}
              </span>
              <span>${text}</span>
            </div>
          `;
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          showMessage("");
          const rawEmail = document.getElementById("email").value || "";
          const email = rawEmail.trim().toLowerCase();
          const password = document.getElementById("password").value;
          const submitBtn = form.querySelector("button[type=submit]");
          submitBtn.disabled = true;
          submitBtn.textContent = "A entrar…";

          if (!email || !password) {
            showMessage("Email e palavra-passe são obrigatórios.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }

          if (!isValidEmail(email)) {
            showMessage("Email inválido — confirma o endereço.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }

          const { data, error } = await window.supabase.auth.signInWithPassword(
            {
              email,
              password,
            },
          );
          if (error) {
            showMessage("Erro: " + error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = "Entrar";
            return;
          }
          // Successful login: redirect admins to admin screen
          try {
            const session =
              data?.session ||
              (await window.supabase.auth.getSession()).data.session;
            const userEmail = session?.user?.email;
            if (userEmail) {
              const { data: prof } = await window.supabase
                .from("professores")
                .select("role")
                .eq("email", userEmail)
                .maybeSingle();
              if (prof?.role === "admin") {
                window.location.href = "admin.html";
                return;
              }
            }
          } catch (e) {
            console.warn("Post-login role check failed", e);
          }
          window.location.href = "index.html";
        });

        document
          .getElementById("forgot")
          .addEventListener("click", async () => {
            showMessage("");
            const rawEmail = document.getElementById("email").value || "";
            const email = rawEmail.trim().toLowerCase();
            if (!email) {
              showMessage("Coloca o teu email primeiro para recuperar a palavra-passe.");
              return;
            }
            if (!isValidEmail(email)) {
              showMessage("Email inválido — confirma o endereço.");
              return;
            }
            
            const forgotBtn = document.getElementById("forgot");
            forgotBtn.disabled = true;
            forgotBtn.textContent = "A processar...";
            
            const { error } =
              await window.supabase.auth.resetPasswordForEmail(email);
            
            forgotBtn.disabled = false;
            forgotBtn.textContent = "Recuperar Palavra-passe";

            if (error) {
              showMessage("Erro: " + error.message);
            } else {
              showMessage("Pedido de recuperação enviado. Verifica o teu email.", false);
            }
          });
      })();
    </script>
    <footer style="padding: 14px 0; text-align: center; color: var(--text-muted); font-size: 12px;">
      made by antonio.appleton | Departamento de Programação
    </footer>
  </body>
</html>
