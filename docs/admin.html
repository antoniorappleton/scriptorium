<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin — Scriptorium</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  </head>
  <body class="p-6">
    <h1 class="text-2xl font-bold mb-4">Admin — Gestão</h1>

    <section class="mb-6">
      <h2 class="font-semibold">Criar ciclo</h2>
      <input id="cicloNome" placeholder="Nome do ciclo" />
      <button id="createCiclo">Criar</button>
    </section>

    <section class="mb-6">
      <h2 class="font-semibold">Criar turma</h2>
      <input id="turmaNome" placeholder="Nome da turma" />
      <input id="turmaAno" placeholder="Ano" type="number" />
      <select id="turmaCiclo"></select>
      <button id="createTurma">Criar turma</button>
    </section>

    <section class="mb-6">
      <h2 class="font-semibold">Importar alunos (CSV)</h2>
      <input type="file" id="csvFile" accept=".csv" />
      <button id="importCsv">Importar</button>
      <div id="importStatus"></div>
    </section>

    <section class="mb-6">
      <h2 class="font-semibold">Turmas existentes</h2>
      <div id="turmasList"></div>
    </section>

    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
