<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registar Ocorrência — Scriptorium</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  </head>
  <body>
    <header class="app-header">
      <a href="index.html" class="brand">
        <img
          src="assets/logo.png"
          alt="Scriptorium Logo"
          class="brand-logo"
        />
        <div class="brand-text">
          <h1>SCRIPTORIUM</h1>
          <div class="tag">Portal Académico</div>
        </div>
      </a>
      <nav class="nav-menu">
        <a href="index.html">Dashboard</a>
        <a href="registar.html" class="active">Registar Ocorrência</a>
        <a href="admin.html" id="adminNavLink" style="display: none;">Administração</a>
        <button id="signOutBtn">Sair</button>
      </nav>
    </header>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("signOutBtn");
        if (btn) {
          btn.addEventListener("click", () => {
            if (typeof signOut === "function") signOut();
          });
        }
      });
    </script>

    <main class="app-container">
      <div class="narrow-container">
        <div class="app-card">
          <h2 class="app-card-title" style="margin-bottom: 24px;">Registar Nova Ocorrência</h2>
          
          <form id="ocorrenciaForm" style="box-shadow: none; padding: 0;">
            <div class="form-group">
              <label for="alunoNome">Nome do Aluno</label>
              <input
                type="text"
                id="alunoNome"
                required
                placeholder="Nome completo do aluno"
                class="form-control"
              />
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="ciclo">Ciclo</label>
                <select id="ciclo" class="form-control" required>
                  <option value="">A carregar ciclos...</option>
                </select>
              </div>
              
              <div class="form-group">
                <label for="ano">Ano Escolar</label>
                <select id="ano" class="form-control" required>
                  <option value="">Selecione primeiro um ciclo</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="turma">Turma</label>
              <select id="turma" class="form-control" required>
                <option value="">Selecione primeiro o ano</option>
              </select>
            <div class="form-group">
              <label for="data">Data do Acontecimento</label>
              <input
                type="date"
                id="data"
                required
                class="form-control"
              />
            </div>
            
            <div class="form-group">
              <label for="motivo">Motivo / Descrição Detalhada</label>
              <textarea
                id="motivo"
                required
                placeholder="Descreva a ocorrência..."
                class="form-control"
              ></textarea>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 28px;">
              <button
                type="submit"
                class="btn btn-primary"
                style="flex: 2;"
              >
                Gravar Ocorrência
              </button>
              <a href="index.html" class="btn btn-secondary" style="flex: 1;">
                Cancelar
              </a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="js/supabase.js"></script>
    <script>
      (async () => {
        if (window.supabaseReady) await window.supabaseReady;
        try {
          const { data } = await window.supabase.auth.getSession();
          if (!data?.session) {
            window.location.href = "login.html";
            return;
          }

          if (typeof isCurrentUserAdmin === "function") {
            const isAdmin = await isCurrentUserAdmin();
            if (isAdmin) {
              const adminNavLink = document.getElementById("adminNavLink");
              if (adminNavLink) adminNavLink.style.display = "inline-flex";
            }
          }
        } catch (e) {
          console.error("Auth check failed", e);
          window.location.href = "login.html";
        }
      })();
    </script>
    <footer style="padding: 14px 0; text-align: center; color: var(--text-muted); font-size: 12px;">
      made by antonio.appleton | Departamento de Programação
    </footer>
    <script src="js/app.js"></script>
  </body>
</html>
